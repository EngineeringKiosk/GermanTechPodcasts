description: Führung ist kein Singleplayer. 🎮
Viele Manager in Software Entwicklung versuchen, den "Helden" zu spielen. Aber im Business gewinnst du nur im Team. Willkommen im Co-Op Mode!
Ich bin Georg Hofmann, Digital Leader & Coach. Ich zeige dir, was moderne Führungskräfte von Dungeon Mastern lernen können.
Wir übersetzen Agile Leadership in Gaming-Logik: • Psychologische Sicherheit als "Session Zero" • Teams aufstellen wie eine Raid-Party • Strategie als "Infinite Game"
Kein Bullshit-Bingo, sondern echte XP für deinen Alltag. Bau eine Gilde, die jeden Boss besiegt.
Drück Start! 🚀
